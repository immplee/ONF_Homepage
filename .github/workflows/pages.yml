# GitHub Pages 배포 — 레거시(Jekyll) 빌더가 고착·실패를 반복해 Actions 방식으로 전환(2026-07-04).
# main에 push되면 저장소 전체를 그대로 정적 사이트로 올린다(빌드 과정 없음).
name: Deploy Pages
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# ⚠️ cancel-in-progress:false — 연속 push 때 진행 중 배포를 취소하면 그게 '실패'로 찍혀
#    실패 알림 메일이 온다(2026-07-05 Peter 리포트). 취소 대신 큐에 쌓아 순서대로 완료.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: .
      # deploy-pages가 가끔 "try again later"(GitHub 백엔드 일시 오류)로 실패 →
      # 자체 재시도(최대 3회)로 워크플로가 실패 처리되지 않게(메일 억제)
      - id: deployment
        uses: actions/deploy-pages@v4
        with:
          timeout: 600000
          error_count: 15
