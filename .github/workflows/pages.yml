# GitHub Pages 배포 — 레거시(Jekyll) 빌더가 고착·실패를 반복해 Actions 방식으로 전환(2026-07-04).
# main에 push되면 저장소 전체를 그대로 정적 사이트로 올린다(빌드 과정 없음).
name: Deploy Pages
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: .
      - id: deployment
        uses: actions/deploy-pages@v4
