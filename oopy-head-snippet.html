<!-- ============================================================
  우피(Oopy) 커스텀 head 인라인 스니펫 — 정본(2026-07-05)
  ------------------------------------------------------------
  왜 인라인인가: 리뷰 상세 탭 제목(Ownify┃Reviews┃작성자명)은 ownify.js가
  바꾸는데, 하드 리로드(⌘⇧R) 땐 js 파일을 다시 내려받는 동안(0.2~0.5초)
  원제목이 먼저 보인다. 인라인 스크립트는 다운로드 없이 HTML 파싱 즉시
  실행되므로 이 깜빡임이 사라진다. (우피 head 10,240자 제한 고려 — 최소화.
  경로·리뷰목록 확인은 매 발동마다 다시 한다 — SPA 이동 후 다른 페이지
  제목을 잘못 접두하지 않게.)

  적용: Oopy Console → 사이트 설정 → 커스텀 head에서
  기존 ownify.css/js 두 줄 "위"에 아래 <script> 한 줄을 추가.
  ============================================================ -->
<script>(function(){try{var f=function(){var m=location.pathname.replace(/\/+$/,"").match(/^\/([0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12})$/);if(!m)return;if(JSON.parse(localStorage.getItem("onfReviewOrder")||"[]").indexOf(m[1])<0)return;var t=document.querySelector("title");var v=t?t.textContent:document.title;if(v&&v.indexOf("Ownify┃")!==0){var w="Ownify┃Reviews┃"+v.trim();if(t)t.textContent=w;else document.title=w}};f();new MutationObserver(f).observe(document.documentElement,{childList:true,subtree:true,characterData:true})}catch(e){}})();</script>
