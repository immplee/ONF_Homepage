<!-- ============================================================
  우피(Oopy) 커스텀 head 인라인 스니펫 — 정본(2026-07-05)
  ------------------------------------------------------------
  왜 인라인인가: 리뷰 상세 탭 제목(Ownify┃Reviews┃작성자명)은 ownify.js가
  바꾸는데, ownify.js는 <script defer>라 하드 리로드(⌘⇧R) 땐 파일을 다시
  내려받아 파싱이 끝난 뒤 실행된다(0.2~0.5초). 그 사이 서버가 내려준 원제목
  (작성자명)이 탭에 보인다. 인라인 스크립트는 다운로드 없이 HTML 파싱 즉시
  실행되므로 이 깜빡임이 사라진다.

  판정: 경로가 bare-UUID(리뷰 카드 상세)면 접두. 메뉴 페이지(/how·/reviews 등)는
  별칭이라 UUID가 아니므로 안 걸린다. localStorage에 의존하지 않아 콜드 로드에서도
  동작. 이미 'Ownify┃'로 시작하면 건드리지 않아 ownify.js와 핑퐁 없음.

  적용: Oopy Console → 사이트 설정(커스텀 코드/head) →
  기존 ownify.css/js 두 줄 "맨 위"에 아래 <script> 한 줄을 붙여넣기.
  ============================================================ -->
<script>(function(){try{var f=function(){if(!/^\/[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}\/?$/.test(location.pathname))return;var t=document.querySelector("title");var v=t?t.textContent:document.title;if(v&&v.indexOf("Ownify┃")!==0){var w="Ownify┃Reviews┃"+v.trim();if(t)t.textContent=w;else document.title=w}};f();new MutationObserver(f).observe(document.documentElement,{childList:true,subtree:true,characterData:true})}catch(e){}})();</script>
